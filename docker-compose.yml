version: '3.8'

# CSE Routine Generator — task 1 scaffold (no solver, no frontend wiring yet)
# Brings up MySQL + the new Express backend. Run migrations with:
#   docker compose run --rm backend npm run migrate
# Health check:
#   curl http://localhost:4000/api/health
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: YourNewPassword123
      MYSQL_DATABASE: routine_generator
      MYSQL_USER: cse_admin
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pYourNewPassword123"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: cse_admin
      DB_PASSWORD: changeme
      DB_NAME: routine_generator
      PORT: 4000
    depends_on:
      mysql:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
