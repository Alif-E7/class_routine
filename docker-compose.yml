version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: YourNewPassword123
      MYSQL_DATABASE: class_routine
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pYourNewPassword123"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql://root:YourNewPassword123@mysql:3306/class_routine
      JWT_SECRET: super_secret_jwt_key_123
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mysql_data:
